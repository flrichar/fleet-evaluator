apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: microservices-platform
  namespace: fleet-default
spec:
  repo: git@github.com:acmecorp/platform-services.git
  branch: main
  clientSecretName: github-ssh-key
  paths:
    - services/auth
    - services/gateway
    - services/payments
  targets:
    - clusterSelector:
        matchLabels:
          environment: production
  pollingInterval: 60s
  correctDrift:
    enabled: true
